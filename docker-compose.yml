version: '3.8'

services:
  backend:
    build: .
    container_name: oinbox-backend
    restart: unless-stopped
    ports:
      - '8787:8787'
    volumes:
      - ./data:/app/data # SQLite persistence
      - ./uploads:/app/uploads # Image uploads
    environment:
      - NODE_ENV=production
      - PORT=8787
      - DATABASE_URL=file:/app/data/oinbox.db
      - JWT_SECRET=${JWT_SECRET:-your-super-secret-jwt-key}
      - API_KEY=${API_KEY:-} # Gemini API Key
      - DATADOG_API_KEY=${DATADOG_API_KEY:-}
    healthcheck:
      test:
        ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:8787/api/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - oinbox-network

  # Optional: Nginx reverse proxy (uncomment if needed)
  # nginx:
  #   image: nginx:alpine
  #   container_name: oinbox-nginx
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./certs:/etc/nginx/certs:ro
  #   depends_on:
  #     - backend
  #   networks:
  #     - oinbox-network

networks:
  oinbox-network:
    driver: bridge

volumes:
  oinbox-data:
