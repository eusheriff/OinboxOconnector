version: '3.8'

services:
  backend:
    build: .
    container_name: oconnector-backend
    environment:
      - SERVICE_TYPE=backend
      - NODE_ENV=development
    ports:
      - "8787:8787"
    volumes:
      - .:/app
      - /app/node_modules
      - wrangler-state:/app/.wrangler
    entrypoint: ["/app/scripts/docker-entrypoint.sh"]
    command: ["npx", "wrangler", "dev", "--ip", "0.0.0.0", "--local", "--persist"]
    tty: true

  frontend:
    build: .
    container_name: oconnector-frontend
    depends_on:
      - backend
    environment:
      - SERVICE_TYPE=frontend
      - VITE_API_URL=http://localhost:8787
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    command: ["npm", "run", "dev", "--", "--host"]
    tty: true

  docs:
    build: .
    container_name: oconnector-docs
    ports:
      - "3001:3001"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/docs/node_modules
    working_dir: /app/docs
    command: ["npm", "run", "dev"]
    tty: true

volumes:
  wrangler-state:
