name = "oinbox-backend"
main = "backend/src/index.ts"
compatibility_date = "2024-03-20"

# account_id deve ser configurado via variável de ambiente CLOUDFLARE_ACCOUNT_ID
# ou via wrangler login. NAO hardcode aqui.

# Rota personalizada (API)
routes = [
	{ pattern = "api.oinbox.oconnector.tech", custom_domain = true }
]

[triggers]
# Autopilot: Roda a cada 10 minutos (Seg-Sex, 11h-23h UTC = 8h-20h Brasil)
crons = ["*/10 11-23 * * 1-5"]

# database_id de producao — NAO commitar em repositorios publicos
[[d1_databases]]
binding = "DB"
database_name = "oinbox-db"
database_id = "567a1b9f-6f59-4a6b-953e-89ba1eda2b74"

[[r2_buckets]]
binding = "IMAGES"
bucket_name = "oconnector-images"

[ai]
binding = "AI"

[vars]
# IA — Ollama com Gemma 4 (disponível via servidor local)
# Para dev local: configure OLLAMA_URL no .dev.vars
# Para produção: use wrangler secret put OLLAMA_URL http://seu-servidor:11434
STRIPE_PRICE_EXTRA_SEAT = "price_1SnTGCBGBVDzrAhzuL7ICFwJ"
STRIPE_PRICE_EXTRA_AI = "price_1SnTGPBGBVDzrAhzL7GPpFqT"
STRIPE_PRICE_PRO = "price_1SnQxcBGBVDzrAhzxO2rdJ31"
STRIPE_PRICE_BASIC = "price_1SnQxUBGBVDzrAhzlMMZwDjM"
# Segredos configurados via wrangler secret put:
#   EVOLUTION_API_URL, EVOLUTION_API_KEY
#   JWT_SECRET, STRIPE_SECRET_KEY, STRIPE_WEBHOOK_SECRET, etc.
